<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login – MoneyMap</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:#16a34a;--green-l:#dcfce7;--green-d:#14532d;
      --red:#ef4444;--red-l:#fee2e2;
      --bg:#f0fdf4;--card:#ffffff;--border:#bbf7d0;
      --text:#14532d;--label:#166534;--input-bg:#f7fef9;
    }
    body {
      font-family:'Sora',sans-serif;background:var(--bg);min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:2rem 1rem;position:relative;overflow-x:hidden;
    }
    body::before {
      content:'';position:fixed;inset:0;
      background-image:radial-gradient(circle,#86efac 1px,transparent 1px);
      background-size:28px 28px;opacity:.35;pointer-events:none;z-index:0;
    }
    .auth-card {
      position:relative;z-index:1;background:var(--card);
      border:1.5px solid var(--border);border-radius:20px;
      width:100%;max-width:400px;padding:2.4rem 2.2rem 2rem;
      box-shadow:0 4px 32px rgba(22,163,74,.10),0 1px 4px rgba(0,0,0,.04);
    }
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:.3rem;}
    .logo-icon{width:40px;height:40px;background:var(--green);border-radius:12px;
      display:flex;align-items:center;justify-content:center;font-size:20px;}
    .logo h1{font-size:1.55rem;font-weight:700;color:var(--text);letter-spacing:-.5px;}
    .subtitle{font-size:.82rem;color:#4ade80;font-weight:500;margin-bottom:1.6rem;margin-left:50px;}
    .divider{height:1px;background:var(--border);margin-bottom:1.5rem;}
    .flash{padding:.65rem 1rem;border-radius:10px;font-size:.82rem;margin-bottom:1rem;font-weight:500;}
    .flash.success{background:var(--green-l);color:var(--green-d);border:1px solid #86efac;}
    .flash.error{background:var(--red-l);color:#991b1b;border:1px solid #fca5a5;}
    .form-group{margin-bottom:1.1rem;}
    label{display:block;font-size:.78rem;font-weight:600;color:var(--label);
      margin-bottom:.35rem;letter-spacing:.3px;text-transform:uppercase;}
    input[type="email"],input[type="password"]{
      width:100%;padding:.65rem .9rem;font-family:'Sora',sans-serif;font-size:.88rem;
      background:var(--input-bg);border:1.5px solid #d1fae5;border-radius:10px;
      color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;
    }
    input[type="email"]::placeholder,input[type="password"]::placeholder{color:#a7f3d0;}
    input[type="email"]:focus,input[type="password"]:focus{
      border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.10);}
    .remember-row{display:flex;align-items:center;justify-content:space-between;margin-top:.7rem;}
    .remember-label{display:flex;align-items:center;gap:8px;cursor:pointer;
      font-size:.82rem;color:var(--label);font-weight:500;
      text-transform:none;letter-spacing:0;margin:0;}
    .remember-label input[type="checkbox"]{
      width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
    .forgot-link{font-size:.78rem;color:var(--green);text-decoration:none;font-weight:600;}
    .forgot-link:hover{text-decoration:underline;}
    .btn{display:block;width:100%;padding:.75rem;margin-top:1.4rem;border:none;
      border-radius:11px;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;
      cursor:pointer;letter-spacing:.2px;transition:transform .15s,box-shadow .15s,background .15s;}
    .btn-primary{background:var(--green);color:#fff;box-shadow:0 2px 12px rgba(22,163,74,.22);}
    .btn-primary:hover{background:#15803d;box-shadow:0 4px 18px rgba(22,163,74,.30);transform:translateY(-1px);}
    .btn-primary:active{transform:scale(.98);}
    .auth-link{text-align:center;margin-top:1.3rem;font-size:.82rem;color:#4ade80;}
    .auth-link a{color:var(--green);font-weight:600;text-decoration:none;}
    .auth-link a:hover{text-decoration:underline;}
  </style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <h1>MoneyMap</h1>
  </div>
  <p class="subtitle">Sign in to your account</p>
  <div class="divider"></div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" name="remember_me">
          Remember me for 30 days
        </label>
        <a href="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>
    </div>
    <button class="btn btn-primary" type="submit">Sign In →</button>
  </form>

  <p class="auth-link">Don't have an account? <a href="/register">Create one free</a></p>
</div>
</body>
</html>
